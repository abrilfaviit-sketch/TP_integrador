<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <main>
        <section id="contacto">
            <h2>Contacto</h2>
            <form action="mailto:tu-email@ejemplo.com" method="post" enctype="text/plain"></form>
                
                <br><br>
                <fieldset>
                    <legend>Formulario de Contacto</legend>
                    <label for="nombre">Nombre:</label><br>
                    <input type="text" id="nombre" name="nombre" placeholder="Ingrese su nombre" required><br><br>

                    <label for="nombre"> Apellido:</label><br>
                    <input type="text" id="nombre" name="nombre"placeholder="Ingrese su apellido" required><br><br>

                    <label for="email">Correo Electrónico:</label><br>
                    <input type="email" id="email" name="email" placeholder="Ingrese su correo" required><br><br>

                    <label for="mensaje">Mensaje:</label><br>
                    <textarea id="mensaje" name="mensaje" rows="4" cols="50" required></textarea><br><br>

                    <input type="submit" value="Enviar">
                    <input type="reset" value="Borrar">
                </fieldset>
                <br>
                <a href="index.html">Volver a la página principal</a>
    </main>
</body>
</html>
