<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="c:\Users\Abril\Downloads\forms.png" type="image/x-icon">
    <title>Formulario</title>
</head>
<body>
    <main>
        <section id="contacto">
            <hr></hr>
            <h2> <strong>Contacto</strong></h2>
            <hr></hr>
            <form action="mailto:tu-email@ejemplo.com" method="post" enctype="text/plain"></form>
                <br>

                <fieldset>
            <form action="">
                <label><strong>Nombre:</strong></label><br>
                <input type="text" placeholder="Ingrese su nombre" required>
                <br><br>

                <label><strong>Apellido:</strong></label><br>
                <input type="text" placeholder="Ingrese su apellido" required>
                <br><br>

                <label><strong>N.º de celular:</strong></label><br>
                <input type="tel" pattern="[0-9]+" title="Solo se permiten números" placeholder="Ingrese su número " required>
                <br><br>

                <label><strong>Correo:</strong></label><br>
                <input type="email" placeholder="Ingrese su correo" required>
                <br><br>

                <label><strong>Mensaje:</strong></label><br>
                <textarea name="mensaje" rows="6" cols="21" placeholder="Deje su mensajito divino"></textarea>
                <br><br>
                

                <input type="submit" value="Enviar" >
                <input type="reset" value="Borrar">
                </fieldset>
                <br>
                <br><br><br>
                </form>
                </section>

                    <section id="Sobre tu carrera">
                        <form action="">
                <fieldset>
                    <legend><strong>Sobre tu carrera</strong></legend>
                    <p><strong>Turno de Combate:</strong></p>
                     <input type="radio" id="manana" name="turno" value="manana">
                    <label for="manana">Mañana (<i>6:00 AM</i>)</label><br>
                     <input type="radio" id="tarde" name="turno" value="tarde">
                     <label for="tarde">Tarde (<i>Energía alta</i>)</label><br>
                    <input type="radio" id="noche" name="turno" value="noche">
                    <label for="noche">Noche (<i>Modo búho</i>)</label><br><br>

                    <label><strong>Nivel de preparación para el examen:</strong></label><br>
                    <input type="range" name="preparacion" min="0" max="10" value="5">
                    <br><br>

                    <label><strong>Materia más difícil hasta ahora:</strong></label><br>
                    <select name="materia">
                    <option value="programacion">Programación</option>
                    <option value="base-de-datos">Base de Datos</option>
                    <option value="matematica">Matemática Discreta</option>
                    <option value="ingles">Inglés Técnico</option>
                    <input type="text" placeholder="Otra materia" name="otra-materia">
                     </select>
                        <br><br>

                    <label><strong>Fecha de la próxima batalla (Parcial):</strong></label><br>
                    <input type="date" name="fecha_examen">
                    <br><br>
                        
                    <p><strong>Equipamiento listo:</strong></p>
                    <input type="checkbox" id="resaltador" name="equipo" value="resaltador">
                    <label for="resaltador">Resaltadores</label><br>
                    <input type="checkbox" id="cafe" name="equipo" value="cafe">
                    <label for="cafe">Café/Mate</label><br>
                    <input type="checkbox" id="computadora" name="equipo" value="compu">
                    <label for="computadora">Computadora</label><br>
                    <input type="text" placeholder="Qué otra cosa necesitas?" name="Otro equipo">
                    <br><br>

                    <input type="submit" value="Enviar" >
                    <input type="reset" value="Borrar" >
                    </form>
                  </section>


                </fieldset>

                    <br><br><br><br>
                <fieldset>
                <a href="index.html">Volver a la página principal</a>
                </fieldset>
                
                
    </main>
</body>
</html>
